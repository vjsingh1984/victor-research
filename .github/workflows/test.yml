name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Clone and install main victor framework from develop branch FIRST
          git clone --branch develop https://github.com/vjsingh1984/victor.git /tmp/victor-framework
          pip install -e /tmp/victor-framework
          # Install victor-sdk (part of victor-ai monorepo, needed for tests)
          pip install -e /tmp/victor-framework/victor-sdk
          # Now install the vertical (victor-ai already satisfies dependency)
          pip install -e ".[dev]"
      
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
      
      - name: Check coverage
        run: |
          pytest tests/ --cov=victor_research --cov-report=term-missing
