name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Clone and install main victor framework from develop branch
          git clone --branch develop https://github.com/vjsingh1984/victor.git /tmp/victor-framework
          pip install -e /tmp/victor-framework
          # Install victor-sdk (part of victor-ai monorepo)
          pip install -e /tmp/victor-framework/victor-sdk
          # Install the vertical package with dev dependencies
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -n auto --dist loadscope

      - name: Check coverage
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ --cov=victor_research --cov-report=term-missing
